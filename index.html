<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feliz 4 anos 💗</title>
  <meta name="description" content="Espero que goste 💗" />

  <!-- Preview ao compartilhar o link (WhatsApp, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:url" content="https://caiodeandrade.github.io/album-namoro/" />
  <meta property="og:title" content="Feliz 4 anos 💗" />
  <meta property="og:description" content="Espero que goste 💗" />
  <meta property="og:image" content="https://caiodeandrade.github.io/album-namoro/assets/photos/01.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="900" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Feliz 4 anos 💗" />
  <meta name="twitter:description" content="Espero que goste 💗" />
  <meta name="twitter:image" content="https://caiodeandrade.github.io/album-namoro/assets/photos/01.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="hearts-canvas" aria-hidden="true"></canvas>

  <header class="hero">
    <p class="hero-label">// registro_de_afeto.log</p>
    <div class="hero-heart" aria-hidden="true">💗</div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <p class="hero-date" id="hero-date"></p>

    <div class="counter" id="counter" aria-label="Tempo juntos">
      <div class="counter-unit"><span class="counter-value" id="c-years">0</span><span class="counter-label">anos</span></div>
      <div class="counter-unit"><span class="counter-value" id="c-months">0</span><span class="counter-label">meses</span></div>
      <div class="counter-unit"><span class="counter-value" id="c-days">0</span><span class="counter-label">dias</span></div>
      <div class="counter-unit"><span class="counter-value" id="c-time">00:00:00</span><span class="counter-label">de amor</span></div>
    </div>

    <div class="scroll-hint" aria-hidden="true">scroll ↓</div>
  </header>

  <section class="intro-letter">
    <div class="intro-letter-content" id="intro-text"></div>
  </section>

  <main id="album"></main>

  <footer class="outro">
    <div class="outro-heart" aria-hidden="true">💗</div>
    <h2 class="outro-title" id="outro-title"></h2>
    <p class="outro-message" id="outro-message"></p>
    <p class="outro-sign">feito com &lt;3 e um pouco de código</p>
  </footer>

  <!-- Player de música (YouTube, escondido) + botão de controle -->
  <div id="yt-player" aria-hidden="true"></div>
  <button id="music-toggle" class="music-toggle" type="button" aria-label="Tocar música" title="Nossa música">
    <span class="music-icon" aria-hidden="true">♫</span>
    <span class="music-hint" id="music-hint">toque para ouvir nossa música</span>
  </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="data/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
